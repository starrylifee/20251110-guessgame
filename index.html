<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 양감 어림 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }
        .feedback-correct { animation: pulse-green 1s; }
        .feedback-wrong { animation: shake 0.5s; }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 10px 20px rgba(74, 222, 128, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        @keyframes fly-by-slow {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(250%); }
        }
        @keyframes fly-by-fast {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(250%); }
        }
        .flying-object {
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            position: absolute;
        }
        /* Stage Backgrounds */
        .bg-stage-1 { background-color: #e0f2fe; } /* light blue */
        .bg-stage-2 { background-color: #ecfdf5; } /* light green */
        .bg-stage-3 { background-color: #fefce8; } /* light yellow */
        .bg-stage-bonus { background-image: linear-gradient(to top, #ffdde1, #ee9ca7); } /* pink gradient */
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-2xl mx-auto p-4 md:p-6">
        
        <div id="menu-screen" class="text-center bg-white p-8 rounded-xl shadow-lg">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">수학 양감 어림 게임</h1>
            <p class="text-gray-600 mb-8">참고 크기를 보고 정답을 추측해보세요!</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button data-mode="length" class="game-mode-btn bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition-transform transform hover:scale-105">📏 길이 어림하기</button>
                <button data-mode="angle" class="game-mode-btn bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg transition-transform transform hover:scale-105">∠ 각도 어림하기</button>
                <button data-mode="area" class="game-mode-btn bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg transition-transform transform hover:scale-105">📐 넓이 어림하기</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="game-title" class="text-2xl font-bold text-gray-800"></h2>
                    <div id="progress-indicator" class="text-lg font-bold text-gray-600"></div>
                    <button id="back-to-menu" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg">처음으로</button>
                </div>
                
                <div id="problem-display" class="relative w-full h-64 md:h-80 bg-gray-50 rounded-lg mb-4 border flex items-center justify-center gap-4 p-4 overflow-hidden"></div>
                <div id="reference-display" class="relative overflow-hidden flex justify-center items-end gap-4 h-48 mb-4 p-2 bg-gray-50 rounded-lg border"></div>

                <div class="mt-6">
                    <div id="answer-section">
                        <p class="text-center text-lg text-gray-700 mb-2">물음표(?)의 값은 얼마일까요?</p>
                        <div id="live-feedback" class="text-center h-12">
                            <p id="feedback-hint" class="text-xl font-bold"></p>
                            <p id="chances-left" class="text-gray-600"></p>
                        </div>
                        <div id="input-answer-area" class="flex items-center justify-center gap-2">
                            <input type="number" id="guess-input" class="text-center text-xl font-bold border-2 border-gray-300 rounded-lg w-32 p-2 focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" placeholder="숫자 입력">
                            <span id="unit-label" class="text-xl font-bold text-gray-600">cm</span>
                            <button id="submit-guess" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg transition-transform transform hover:scale-105">확인</button>
                        </div>
                        <div id="multiple-choice-options" class="grid grid-cols-3 sm:grid-cols-5 gap-2 mt-4"></div>
                    </div>
                    <div id="result-section" class="hidden text-center">
                        <p id="feedback-message" class="text-xl font-bold mb-2"></p>
                        <p id="correct-answer" class="text-gray-600 mb-4"></p>
                        <button id="next-problem" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-8 rounded-lg transition-transform transform hover:scale-105">다음 문제</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="end-screen" class="hidden text-center bg-white p-8 rounded-xl shadow-lg">
             <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">🎉 게임 종료! 🎉</h1>
             <p id="final-score" class="text-2xl text-gray-600 mb-8"></p>
             <button id="play-again-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition-transform transform hover:scale-105">다시하기</button>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
            <div class="bg-white p-8 rounded-lg shadow-xl text-center">
                <p id="modal-message" class="text-2xl font-bold text-gray-800"></p>
            </div>
        </div>
    </div>

    <script type="module">
        const menuScreen = document.getElementById('menu-screen'), gameScreen = document.getElementById('game-screen'), endScreen = document.getElementById('end-screen'), gameTitle = document.getElementById('game-title'), progressIndicator = document.getElementById('progress-indicator'), problemDisplay = document.getElementById('problem-display'), referenceDisplay = document.getElementById('reference-display'), guessInput = document.getElementById('guess-input'), unitLabel = document.getElementById('unit-label'), submitGuessBtn = document.getElementById('submit-guess'), feedbackMessage = document.getElementById('feedback-message'), correctAnswerEl = document.getElementById('correct-answer'), nextProblemBtn = document.getElementById('next-problem'), answerSection = document.getElementById('answer-section'), resultSection = document.getElementById('result-section'), feedbackHint = document.getElementById('feedback-hint'), chancesLeft = document.getElementById('chances-left'), finalScoreEl = document.getElementById('final-score'), playAgainBtn = document.getElementById('play-again-btn'), body = document.body, modal = document.getElementById('modal'), modalMessage = document.getElementById('modal-message'), inputAnswerArea = document.getElementById('input-answer-area'), multipleChoiceOptions = document.getElementById('multiple-choice-options');
        
        let currentMode = '', correctAnswer = 0, remainingChances = 3, currentQuestionNumber = 1, totalQuestions = 10, score = 0;

        function startGame(mode) {
            currentMode = mode; currentQuestionNumber = 1; score = 0;
            menuScreen.classList.add('hidden'); endScreen.classList.add('hidden'); gameScreen.classList.remove('hidden');

            const modeDetails = {
                length: { title: '📏 길이 어림하기', unit: 'cm' },
                angle: { title: '∠ 각도 어림하기', unit: '°' },
                area: { title: '📐 넓이 어림하기', unit: 'cm²' },
            };
            gameTitle.textContent = modeDetails[mode].title;
            unitLabel.textContent = modeDetails[mode].unit;
            
            // This initial setup will be overridden by render functions if needed.
            if (mode === 'angle') {
                inputAnswerArea.classList.add('hidden');
                multipleChoiceOptions.classList.remove('hidden');
            } else {
                inputAnswerArea.classList.remove('hidden');
                multipleChoiceOptions.classList.add('hidden');
            }
            loadNextProblem();
        }

        function loadNextProblem() {
            if (currentQuestionNumber > totalQuestions) { showEndScreen(); return; }
            updateBackground();
            progressIndicator.textContent = `문제 ${currentQuestionNumber} / ${totalQuestions}`;
            remainingChances = 3;
            resultSection.classList.add('hidden');
            answerSection.classList.remove('hidden');
            guessInput.value = '';
            feedbackHint.textContent = '';
            chancesLeft.textContent = '';
            feedbackMessage.className = 'text-xl font-bold mb-2';

            const problem = {
                length: generateLengthProblem,
                angle: generateAngleProblem,
                area: generateAreaProblem,
            }[currentMode]();

            const renderer = {
                length: renderLengthProblem,
                angle: renderAngleProblem,
                area: renderAreaProblem,
            }[currentMode];
            
            renderer(problem);
            if(guessInput.offsetParent !== null) guessInput.focus();
        }

        function updateBackground() { /* ... no change ... */ }

        // --- Length Mode ---
        function generateLengthProblem() { /* ... no change ... */ return { target: 0, refs: [] }; }
        function renderLengthProblem({ target, refs }) { /* ... no change ... */ }
        function renderLengthStage1({ target, refs, maxValue }) { /* ... no change ... */ }
        function renderLengthStage2({ refs, scale }) { /* ... no change ... */ }
        function renderLengthStage3({ refs, scale }, isBonus) { /* ... no change ... */ }

        // --- Angle Mode ---
        function generateAngleProblem() { /* ... no change ... */ return { target: 0, refs:[], options: [] };}
        function renderAngleProblem({ target, refs, options }) { /* ... no change ... */}
        function showTimedAngle(duration, message, renderFn) { /* ... no change ... */}
        function createAngleDiv(angle, size, isTarget) { /* ... no change ... */ return ''; }
        
        // --- Area Mode ---
        function findFactors(num) {
            if (num === 0) return [0, 0];
            let bestFactors = [1, num];
            for (let i = Math.floor(Math.sqrt(num)); i >= 1; i--) {
                if (num % i === 0) {
                    bestFactors = [i, num / i]; // [width, height]
                    break;
                }
            }
            if (Math.random() > 0.5) {
                return bestFactors.reverse();
            }
            return bestFactors;
        }

        function generateAreaProblem() {
            let options = null;
            if (currentQuestionNumber <= 8) { // Questions 1-8 are multiple choice
                options = new Set();
            }

            if (currentQuestionNumber <= 5) { // Stage 1: Perfect Squares (Multiple Choice)
                const perfectSquares = [1, 4, 9, 16, 25, 36, 49, 64, 81, 100];
                const numbers = new Set();
                const targetIndex = Math.floor(Math.random() * perfectSquares.length);
                const target = perfectSquares[targetIndex];
                correctAnswer = target;
                numbers.add(target);
                options.add(target);

                while (numbers.size < 3) { // For reference shapes
                    const refIndex = Math.floor(Math.random() * perfectSquares.length);
                    numbers.add(perfectSquares[refIndex]);
                }
                
                while (options.size < 6) { // For multiple choice options
                    const optionIndex = Math.floor(Math.random() * perfectSquares.length);
                    options.add(perfectSquares[optionIndex]);
                }
                numbers.delete(target);
                return { target, refs: Array.from(numbers), shape: 'square', options: Array.from(options).sort((a,b)=>a-b) };

            } else { // Stage 2: Rectangles (Questions 6-10)
                const numbers = new Set();
                
                // Function to create areas from factors that aren't too skewed (avoiding "needle" shapes)
                const createGoodRectangleArea = () => {
                    const factor1 = Math.floor(Math.random() * 9) + 2; // 2 to 10
                    const factor2 = Math.floor(Math.random() * 9) + 2; // 2 to 10
                    return factor1 * factor2;
                };

                let target = createGoodRectangleArea();
                
                correctAnswer = target;
                numbers.add(target);
                if (options) options.add(target); // For questions 6-8

                while (numbers.size < 3) { // Generate reference numbers
                    numbers.add(createGoodRectangleArea());
                }
                
                if (options) { // For questions 6-8 (Multiple Choice)
                    while (options.size < 6) {
                        const option = Math.max(1, target + Math.floor(Math.random() * 21) - 10); // Options near target
                        if (option > 0) options.add(option);
                    }
                }
                numbers.delete(target);
                return { target, refs: Array.from(numbers), shape: 'rectangle', options: options ? Array.from(options).sort((a,b)=>a-b) : null };
            }
        }

        function renderAreaProblem({ target, refs, shape, options }) {
            const allAreas = [target, ...refs];
            let maxDimension = 0;
            allAreas.forEach(area => {
                const dims = (shape === 'square') ? [Math.sqrt(area), Math.sqrt(area)] : findFactors(area);
                maxDimension = Math.max(maxDimension, dims[0], dims[1]);
            });

            // --- UNIFIED SCALING LOGIC (FIXED) ---
            const problemHeight = problemDisplay.clientHeight;
            const referenceHeight = referenceDisplay.clientHeight;
            const scaleForProblem = problemHeight > 40 && maxDimension > 0 ? (problemHeight - 40) / maxDimension : 1;
            const scaleForReference = referenceHeight > 40 && maxDimension > 0 ? (referenceHeight - 40) / maxDimension : 1;
            const scale = Math.min(scaleForProblem, scaleForReference);
            // --- END UNIFIED SCALING LOGIC ---

            problemDisplay.innerHTML = createAreaShape(target, scale, true, shape);
            referenceDisplay.className = "relative flex justify-center items-center gap-4 h-48 mb-4 p-2 bg-gray-50 rounded-lg border";
            referenceDisplay.innerHTML = refs.map(ref => createAreaShape(ref, scale, false, shape)).join('');
            
            multipleChoiceOptions.innerHTML = '';
            if (options) { // Questions 1-8 (Multiple Choice)
                inputAnswerArea.classList.add('hidden');
                multipleChoiceOptions.classList.remove('hidden');
                options.forEach(option => {
                    const button = document.createElement('button');
                    button.className = "bg-gray-200 hover:bg-indigo-200 text-gray-800 font-bold py-2 px-4 rounded-lg transition";
                    button.textContent = `${option} cm²`;
                    button.dataset.value = option;
                    multipleChoiceOptions.appendChild(button);
                });
            } else { // Questions 9-10 (Free Response)
                inputAnswerArea.classList.remove('hidden');
                multipleChoiceOptions.classList.add('hidden');
            }
        }
        
        function createAreaShape(area, scale, isTarget, shape) {
            let width, height;
            if (shape === 'square') {
                const side = Math.sqrt(area);
                width = side; height = side;
            } else {
                const factors = findFactors(area);
                width = factors[0]; height = factors[1];
            }

            const scaledWidth = width * scale;
            const scaledHeight = height * scale;
            const label = isTarget ? '?' : `${area} cm²`;
            const color = isTarget ? 'bg-orange-400' : 'bg-gray-400';
            const textColor = isTarget ? 'text-orange-600' : 'text-gray-700';

            return `<div class="flex flex-col items-center justify-center">
                        <div class="${color} flex items-center justify-center rounded" style="width:${scaledWidth}px; height:${scaledHeight}px;">
                           ${isTarget ? `<span class="text-4xl font-bold text-white">?</span>` : ''}
                        </div>
                        <p class="mt-2 text-lg font-bold ${textColor}">${label}</p>
                    </div>`;
        }


        // --- Core Game Logic ---
        function handleGuess(guess, targetButton = null) {
            if (guess === correctAnswer) {
                if (remainingChances === 3) score++;
                feedbackMessage.textContent = '🎉 정답입니다! 🎉';
                feedbackMessage.className += ' text-green-500 feedback-correct';
                correctAnswerEl.textContent = `정답은 ${correctAnswer}${unitLabel.textContent} 입니다.`;
                showResultAndNextButton();
                return;
            }

            remainingChances--;
            if(targetButton) {
                targetButton.disabled = true;
                targetButton.classList.remove('hover:bg-indigo-200');
                targetButton.classList.add('bg-red-200', 'cursor-not-allowed');
            }
            if(guessInput) guessInput.value = '';

            if (remainingChances > 0) {
                const hint = guess > correctAnswer ? '조금 더 작아요! (DOWN) 🤔' : '조금 더 커요! (UP) 🤔';
                feedbackHint.textContent = hint;
                feedbackHint.className = 'text-xl font-bold text-red-500 feedback-wrong';
                chancesLeft.textContent = `${remainingChances}번의 기회가 남았습니다.`;
                setTimeout(() => { feedbackHint.className = 'text-xl font-bold text-red-500'; }, 500);
            } else {
                feedbackMessage.textContent = '아쉽네요! 기회를 모두 사용했어요.';
                feedbackMessage.className += ' text-red-500';
                correctAnswerEl.textContent = `정답은 ${correctAnswer}${unitLabel.textContent} 입니다.`;
                showResultAndNextButton();
            }
        }
        
        function showResultAndNextButton() { /* ... no change ... */ }
        function showEndScreen() { /* ... no change ... */ }

        // --- Event Listeners ---
        document.querySelectorAll('.game-mode-btn').forEach(btn => btn.addEventListener('click', () => startGame(btn.dataset.mode)));
        
        document.getElementById('back-to-menu').addEventListener('click', () => {
            gameScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            menuScreen.classList.remove('hidden');
            body.className = 'bg-gray-100 flex items-center justify-center min-h-screen';
        });
        
        playAgainBtn.addEventListener('click', () => {
            endScreen.classList.add('hidden');
            menuScreen.classList.remove('hidden');
            body.className = 'bg-gray-100 flex items-center justify-center min-h-screen';
        });

        submitGuessBtn.addEventListener('click', () => {
             const userGuess = parseInt(guessInput.value, 10);
             if (!isNaN(userGuess) && userGuess > 0) handleGuess(userGuess);
        });
        guessInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const userGuess = parseInt(guessInput.value, 10);
                if (!isNaN(userGuess) && userGuess > 0) handleGuess(userGuess);
            }
        });
        multipleChoiceOptions.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON') {
                const userGuess = parseInt(e.target.dataset.value, 10);
                handleGuess(userGuess, e.target);
            }
        });
        nextProblemBtn.addEventListener('click', () => { currentQuestionNumber++; loadNextProblem(); });

        // --- Helper functions for brevity ---
        // (Copied from previous versions to keep the file complete)
        generateLengthProblem = function() { const numbers = new Set(); const target = Math.floor(Math.random() * 20) + 1; correctAnswer = target; numbers.add(target); while (numbers.size < 3) { numbers.add(Math.floor(Math.random() * 20) + 1); } numbers.delete(target); return { target, refs: Array.from(numbers).sort((a,b) => a-b) }; }
        renderLengthProblem = function({ target, refs }) { const maxValue = Math.max(target, ...refs); problemDisplay.innerHTML = ''; referenceDisplay.innerHTML = ''; problemDisplay.className = 'relative w-full h-64 md:h-80 bg-gray-50 rounded-lg mb-4 border flex items-end justify-center gap-4 p-4 overflow-hidden'; referenceDisplay.style.display = 'flex'; if (currentQuestionNumber <= 3) { renderLengthStage1({ target, refs, maxValue }); referenceDisplay.style.display = 'none'; } else { const maxBarPixelHeight = referenceDisplay.clientHeight - 40; const scale = maxBarPixelHeight > 0 ? maxBarPixelHeight / maxValue : 1; problemDisplay.innerHTML = `<div class="h-full flex flex-col justify-end items-center"><p class="text-2xl font-bold text-indigo-600 mb-1">?</p><div class="bg-indigo-400 rounded" style="width: 50px; height: ${target * scale}px;"></div></div>`; if (currentQuestionNumber <= 6) renderLengthStage2({ refs, scale }); else renderLengthStage3({ refs, scale }, currentQuestionNumber === 10); } }
        renderLengthStage1 = function({ target, refs, maxValue }) { problemDisplay.className = 'relative w-full h-64 md:h-80 bg-gray-50 rounded-lg mb-4 border flex flex-col items-stretch justify-around p-6 overflow-hidden'; let items = [ { value: target, isTarget: true }, { value: refs[0], isTarget: false }, { value: refs[1], isTarget: false } ].sort(() => Math.random() - 0.5); const maxBarPixelWidth = problemDisplay.clientWidth - 120; const scale = maxBarPixelWidth > 0 ? maxBarPixelWidth / maxValue : 1; problemDisplay.innerHTML = items.map(item => { const label = item.isTarget ? '?' : `${item.value} cm`; const color = item.isTarget ? 'bg-indigo-400' : 'bg-gray-400'; return `<div class="flex items-center gap-2"><p class="w-16 text-lg font-bold text-right">${label}</p><div class="${color} rounded" style="height: 40px; width: ${item.value * scale}px;"></div></div>`; }).join(''); }
        renderLengthStage2 = function({ refs, scale }) { referenceDisplay.innerHTML = refs.map(ref => `<div class="h-full flex flex-col justify-end items-center"><p class="text-lg font-bold text-gray-700 mb-1">${ref} cm</p><div class="bg-gray-400 rounded" style="width: 50px; height: ${ref * scale}px;"></div></div>`).join(''); }
        renderLengthStage3 = function({ refs, scale }, isBonus) { const duration = isBonus ? '1.5s' : '5s'; const animationName = isBonus ? 'fly-by-fast' : 'fly-by-slow'; referenceDisplay.innerHTML = refs.map((ref, i) => `<div class="flying-object flex flex-col items-center" style="animation-name:${animationName}; animation-duration:${duration}; animation-delay:${i * 1.5}s;"><p class="text-lg font-bold text-gray-700 mb-1">${ref} cm</p><div class="bg-gray-400 rounded" style="width: 50px; height: ${ref * scale}px;"></div></div>`).join(''); }
        generateAngleProblem = function() { const target = (Math.floor(Math.random() * 11) + 1) * 15; correctAnswer = target; const options = new Set([target]); while (options.size < 10) { const option = (Math.floor(Math.random() * 11) + 1) * 15; options.add(option); } return { target, refs: [45, 90, 135], options: Array.from(options).sort((a, b) => a - b) }; }
        renderAngleProblem = function({ target, refs, options }) { problemDisplay.innerHTML = ''; referenceDisplay.innerHTML = ''; multipleChoiceOptions.innerHTML = ''; referenceDisplay.style.display = 'none'; answerSection.classList.remove('hidden'); problemDisplay.className = 'relative w-full h-64 md:h-80 bg-gray-50 rounded-lg mb-4 border flex items-center justify-center gap-4 p-4 overflow-hidden'; const renderProblemAngle = () => problemDisplay.innerHTML = createAngleDiv(target, 120, true); if (currentQuestionNumber <= 4) { problemDisplay.className = 'relative w-full h-48 bg-gray-50 rounded-lg mb-4 border flex items-center justify-center gap-4 p-4 overflow-hidden'; referenceDisplay.style.display = 'flex'; referenceDisplay.className = "relative flex justify-center items-center gap-4 h-32 mb-4 p-2 bg-gray-50 rounded-lg border"; referenceDisplay.innerHTML = refs.map(ref => createAngleDiv(ref, 60, false)).join(''); renderProblemAngle(); } else if (currentQuestionNumber <= 8) { renderProblemAngle(); } else if (currentQuestionNumber === 9) { showTimedAngle(1000, "1초 후 사라집니다.", renderProblemAngle); } else if (currentQuestionNumber === 10) { showTimedAngle(500, "0.5초 후 사라집니다.", renderProblemAngle); } options.forEach(option => { const button = document.createElement('button'); button.className = "bg-gray-200 hover:bg-indigo-200 text-gray-800 font-bold py-2 px-4 rounded-lg transition"; button.textContent = `${option}°`; button.dataset.value = option; multipleChoiceOptions.appendChild(button); }); }
        showTimedAngle = function(duration, message, renderFn) { answerSection.classList.add('hidden'); modalMessage.textContent = message; modal.classList.remove('hidden'); setTimeout(() => { modal.classList.add('hidden'); renderFn(); answerSection.classList.remove('hidden'); setTimeout(() => { problemDisplay.innerHTML = '<p class="text-2xl text-gray-400">사라짐!</p>'; }, duration); }, 2000); }
        createAngleDiv = function(angle, size, isTarget) { const label = isTarget ? '?' : `${angle}°`; const color = isTarget ? 'bg-indigo-500' : 'bg-gray-500'; const textColor = isTarget ? 'text-indigo-600' : 'text-gray-700'; return `<div class="flex flex-col items-center justify-center p-2"><div class="relative" style="width: ${size}px; height: ${size}px;"><div class="absolute top-1/2 left-0 w-1/2 h-1 bg-gray-500" style="transform-origin: right center;"></div><div class="absolute top-1/2 left-0 w-1/2 h-1 ${color}" style="transform: rotate(${-angle}deg); transform-origin: right center;"></div></div><p class="mt-2 text-lg font-bold ${textColor}">${label}</p></div>`; }
        showResultAndNextButton = function() { answerSection.classList.add('hidden'); resultSection.classList.remove('hidden'); }
        showEndScreen = function() { gameScreen.classList.add('hidden'); endScreen.classList.remove('hidden'); body.className = 'bg-gray-100 flex items-center justify-center min-h-screen'; finalScoreEl.textContent = `첫 시도 정답: ${score} / ${totalQuestions} 문제`; }
        updateBackground = function() { body.classList.remove('bg-stage-1', 'bg-stage-2', 'bg-stage-3', 'bg-stage-bonus', 'bg-gray-100'); if (currentMode !== 'length') { body.classList.add('bg-gray-100'); return; } if (currentQuestionNumber <= 3) body.classList.add('bg-stage-1'); else if (currentQuestionNumber <= 6) body.classList.add('bg-stage-2'); else if (currentQuestionNumber <= 9) body.classList.add('bg-stage-3'); else if (currentQuestionNumber === 10) body.classList.add('bg-stage-bonus'); }
    </script>
</body>
</html>
